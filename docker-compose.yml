services:
  neo4j:
    image: neo4j:${NEO4J_VERSION}
    container_name: ${NEO4J_CONTAINER_NAME}
    networks:
      - security_lab
    ports:
      - "${NEO4J_HTTP_PORT}:7474"
      - "${NEO4J_BOLT_PORT}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME}/${NEO4J_PASSWORD}"
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE}
      TZ: ${TZ}
    restart: unless-stopped

  graph-explorer:
    build: ./graph_explorer
    container_name: ${GRAPH_EXPLORER_CONTAINER_NAME}
    networks:
      - security_lab
    ports:
      - "${GRAPH_EXPLORER_PORT}:3000"
    environment:
      PORT: 3000
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      TZ: ${TZ}
    depends_on:
      - neo4j
    restart: unless-stopped

networks:
  security_lab:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins: